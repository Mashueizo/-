<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">
<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

<style>
body {
  margin: 0;
  font-family: 'M PLUS Rounded 1c', sans-serif;

  background: url("aozora.jpeg") no-repeat center center;
  background-size: cover;
}

/* 昼夜演出 */
.day {
  background: linear-gradient(#cfe9ff, #ffffff);
}

.night {
  background: linear-gradient(#0b1026, #1a1f3a);
  color: white;
}

.centerBox {
  max-width: 420px;
  margin: auto;
  padding: 10px;
}

.card {
  background: rgba(255,255,255,0.9);
  border-radius: 20px;
  padding: 15px;
  margin: 10px;
}

.night .card {
  background: rgba(30,30,50,0.9);
  color: white;
}

button {
  margin: 5px;
  padding: 10px;
  border-radius: 15px;
  border: none;
  background: #6c9cff;
  color: white;
}

#map {
  width: 100%;
  height: 300px;
  border-radius: 20px;
}

#questBox {
  display: none;
}
</style>
</head>

<body class="day">

<div class="centerBox">

<!-- ストーリー -->
<div class="card">
  <h3>ストーリー</h3>
  <p id="storyText">まだ始まっていない</p>
</div>

<!-- クエスト -->
<div id="questBox" class="card">
  <p id="questText"></p>
  <button id="acceptQuest">行く</button>
  <button id="rejectQuest">やめる</button>
</div>

<!-- 状態 -->
<div class="card">
  <h2 id="distance">0 km</h2>
  <h3 id="time">0 秒</h3>
  <p id="spotName">現在地：なし</p>
  <p>レベル：<span id="level">1</span></p>
</div>

<div id="map"></div>

<button id="startBtn">スタート</button>
<button id="stopBtn">停止</button>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

/* ===== 状態 ===== */
let map, marker, path = [];
let watchId = null;
let lastLat = null, lastLon = null;

let totalDistance = 0;
let startTime = null;
let timer;

let player = { level: 1, exp: 0 };

let currentQuest = null;

/* ===== ストーリー ===== */
const story = {
  1:"あなたは見知らぬ街で目を覚ました。",
  2:"この街はどこか不自然だ。",
  3:"歩くことで何かが見えてくる。",
  4:"誰かがあなたを見ている気がする。",
  5:"歩き続けろという声がする。"
};

/* ===== スポットAPI（Mapbox） ===== */
mapboxgl.accessToken = "pk.eyJ1IjoibWFzeXV0ZW4iLCJhIjoiY21ueDJ0OG1tMDAwbzJycTBreGJ0c2VvaCJ9.J8pL7ECfCDthwvTOLHgCEQ";

async function getNearbyPlaces(lon, lat, type) {
  const res = await fetch(
    `https://api.mapbox.com/geocoding/v5/mapbox.places/${type}.json` +
    `?proximity=${lon},${lat}&limit=3&access_token=YOUR_MAPBOX_TOKEN`
  );
  return (await res.json()).features;
}

/* ===== 昼夜判定 ===== */
function updateDayNight() {
  const h = new Date().getHours();
  const isNight = (h < 6 || h >= 18);

  document.body.className = isNight ? "night" : "day";
}

/* ===== 距離 ===== */
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)**2;

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

/* ===== クエスト生成 ===== */
function generateQuest() {
  const d = 0.5 + Math.random()*2;

  currentQuest = {
    target: d,
    reward: Math.floor(d*100)
  };

  document.getElementById("questText").textContent =
    `${d.toFixed(1)}km歩いてみよう`;
}

/* ===== ストーリー ===== */
function showStory() {
  const text = story[player.level];
  if (text) {
    document.getElementById("storyText").textContent = text;
  }
}

/* ===== EXP ===== */
function addExp(exp) {
  player.exp += exp;

  if (player.exp >= player.level * 100) {
    player.level++;
    player.exp = 0;

    document.getElementById("level").textContent = player.level;
    showStory();
  }
}

/* ===== マップ ===== */
function initMap(lat, lon) {
  map = new mapboxgl.Map({
    container:"map",
    style:"mapbox://styles/mapbox/streets-v11",
    center:[lon,lat],
    zoom:16
  });

  marker = new mapboxgl.Marker().setLngLat([lon,lat]).addTo(map);
}

/* ===== スタート ===== */
document.getElementById("startBtn").onclick = () => {

  updateDayNight();
  startTime = Date.now();

  timer = setInterval(() => {
    document.getElementById("time").textContent =
      Math.floor((Date.now()-startTime)/1000) + " 秒";
  },1000);

  generateQuest();

  watchId = navigator.geolocation.watchPosition(async pos => {

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    if (!map) initMap(lat,lon);

    marker.setLngLat([lon,lat]);
    map.setCenter([lon,lat]);

    if (lastLat) {
      const d = getDistance(lastLat,lastLon,lat,lon);

      if (d > 0.01) {
        totalDistance += d;
        document.getElementById("distance").textContent =
          totalDistance.toFixed(2)+" km";

        /* クエスト達成 */
        if (currentQuest && totalDistance >= currentQuest.target) {
          addExp(currentQuest.reward);
          generateQuest();
        }
      }
    }

    lastLat = lat;
    lastLon = lon;

    /* 周辺イベント（軽量API例） */
    const places = await getNearbyPlaces(lon,lat,"park");

    if (places.length > 0) {
      document.getElementById("spotName").textContent =
        "近く：" + places[0].text + "（イベント候補）";
    }

  },()=>alert("GPS許可してね"));
};

/* ===== 停止 ===== */
document.getElementById("stopBtn").onclick = () => {
  if (watchId) navigator.geolocation.clearWatch(watchId);
  clearInterval(timer);
};

});
</script>

</body>
</html>
