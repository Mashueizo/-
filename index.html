<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">

<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

<style>
body {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  text-align: center;
  background: linear-gradient(#cfe9ff, #f7f7fb);
  margin: 0;
}

.centerBox {
  max-width: 400px;
  margin: auto;
  padding-top: 20px;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 20px;
  margin: 10px;
}

button {
  margin: 5px;
  padding: 10px;
  border-radius: 20px;
  border: none;
  background: #6c9cff;
  color: white;
}

img {
  display: block;
  margin: 0 auto;
}
</style>
</head>

<body>

<div class="centerBox">

<!-- タイトル -->
<div id="titleScreen">
  <h1>おさんぽアシスタント</h1>
  <button onclick="startGame()">スタート</button>
  <button onclick="showTalk()">おしゃべり</button>
</div>

<!-- ゲーム -->
<div id="gameScreen" style="display:none;">
  <div class="card">
    <h1 id="distance">0 km</h1>
    <p id="message">がんばってね</p>
    <h2 id="time">0 秒</h2>
    <p>ポイント: <span id="points">0</span></p>
  </div>

  <div id="map" style="width:100%; height:300px; border-radius:20px;"></div>

  <img id="character" src="normal.png" width="200">
  <div id="characterSelect"></div>

  <br>
  <button onclick="start()">開始</button>
  <button onclick="stop()">停止</button>
  <button onclick="reset()">リセット</button>
  <button onclick="backTitle()">戻る</button>
</div>

<!-- おしゃべり -->
<div id="talkScreen" style="display:none;">
  <div class="card">
    <p id="talkText">タップしてね</p>
  </div>

  <img id="talkCharacter" src="normal.png" width="200" onclick="talk()">

  <br>
  <button onclick="backTitle()">戻る</button>
</div>

</div>

<script>

/* ---------- 要素取得 ---------- */

const distance = document.getElementById("distance");
const time = document.getElementById("time");
const pointsSpan = document.getElementById("points");
const character = document.getElementById("character");
const characterSelect = document.getElementById("characterSelect");
const talkText = document.getElementById("talkText");
const talkCharacter = document.getElementById("talkCharacter");

/* ---------- 画面切り替え ---------- */

function startGame() {
  titleScreen.style.display = "none";
  gameScreen.style.display = "block";
}

function showTalk() {
  titleScreen.style.display = "none";
  talkScreen.style.display = "block";
}

function backTitle() {
  titleScreen.style.display = "block";
  gameScreen.style.display = "none";
  talkScreen.style.display = "none";
}

/* ---------- 状態 ---------- */

let lastLat = null;
let lastLon = null;
let totalDistance = 0;
let watchId = null;

let startTime = null;
let elapsedTime = 0;
let timerInterval = null;

let points = 0;

/* ---------- キャラ ---------- */

const characters = [
  { name: "ノーマル", img: "normal.png", unlock: 0 },
  { name: "元気", img: "genki.png", unlock: 100 },
  { name: "クール", img: "cool.png", unlock: 300 }
];

let unlocked = [true, false, false];

/* ---------- Mapbox ---------- */

mapboxgl.accessToken = "pk.eyJ1IjoibWFzeXV0ZW4iLCJhIjoiY21ueDJ0OG1tMDAwbzJycTBreGJ0c2VvaCJ9.J8pL7ECfCDthwvTOLHgCEQ";

let map;
let marker;
let path = [];

function initMap(lat, lon) {
  map = new mapboxgl.Map({
    container: "map",
    style: "mapbox://styles/mapbox/streets-v11",
    center: [lon, lat],
    zoom: 16
  });

  marker = new mapboxgl.Marker()
    .setLngLat([lon, lat])
    .addTo(map);

  map.on("load", () => {
    map.addSource("route", {
      type: "geojson",
      data: {
        type: "Feature",
        geometry: {
          type: "LineString",
          coordinates: []
        }
      }
    });

    map.addLayer({
      id: "route",
      type: "line",
      source: "route",
      paint: {
        "line-color": "#ff0000",
        "line-width": 4
      }
    });
  });
}

/* ---------- 距離 ---------- */

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)**2;

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

/* ---------- 開始 ---------- */

function start() {
  if (timerInterval) return;

  startTime = Date.now();

  timerInterval = setInterval(() => {
    const total = elapsedTime + (Date.now() - startTime);
    time.textContent = Math.floor(total/1000) + " 秒";
  }, 1000);

  watchId = navigator.geolocation.watchPosition((pos) => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    if (!map) initMap(lat, lon);

    marker.setLngLat([lon, lat]);
    map.setCenter([lon, lat]);

    path.push([lon, lat]);
    if (map.getSource("route")) {
      map.getSource("route").setData({
        type: "Feature",
        geometry: { type: "LineString", coordinates: path }
      });
    }

    if (lastLat !== null) {
      const d = getDistance(lastLat, lastLon, lat, lon);

      if (d > 0.01) {
        totalDistance += d;
        points += d * 100;

        distance.textContent = totalDistance.toFixed(3) + " km";
        pointsSpan.textContent = Math.floor(points);

        checkUnlock();
        save();
      }
    }

    lastLat = lat;
    lastLon = lon;
  });
}

/* ---------- 停止 ---------- */

function stop() {
  if (watchId) navigator.geolocation.clearWatch(watchId);

  if (timerInterval) {
    clearInterval(timerInterval);
    elapsedTime += Date.now() - startTime;
    timerInterval = null;
  }
}

/* ---------- リセット ---------- */

function reset() {
  stop();

  totalDistance = 0;
  points = 0;
  elapsedTime = 0;
  path = [];

  if (map && map.getSource("route")) {
    map.getSource("route").setData({
      type: "Feature",
      geometry: { type: "LineString", coordinates: [] }
    });
  }

  distance.textContent = "0 km";
  pointsSpan.textContent = "0";
  time.textContent = "0 秒";
}

/* ---------- 解放 ---------- */

function checkUnlock() {
  characters.forEach((ch, i) => {
    if (!unlocked[i] && points >= ch.unlock) {
      unlocked[i] = true;
      alert(ch.name + " 解放！");
      updateCharacterSelect();
    }
  });
}

/* ---------- キャラ選択 ---------- */

function updateCharacterSelect() {
  characterSelect.innerHTML = "";

  characters.forEach((ch, i) => {
    if (unlocked[i]) {
      const btn = document.createElement("button");
      btn.textContent = ch.name;
      btn.onclick = () => character.src = ch.img;
      characterSelect.appendChild(btn);
    }
  });
}

/* ---------- 保存 ---------- */

function save() {
  localStorage.setItem("points", points);
  localStorage.setItem("unlocked", JSON.stringify(unlocked));
}

function load() {
  points = Number(localStorage.getItem("points")) || 0;
  unlocked = JSON.parse(localStorage.getItem("unlocked")) || unlocked;

  pointsSpan.textContent = Math.floor(points);
  updateCharacterSelect();
}

load();

/* ---------- 会話 ---------- */

const talkData = {
  normal: { lines: ["今日もいい感じだね","無理しすぎないでね"], img: "normal.png" },
  walk: { lines: ["もうちょっと歩こ？","いいペースだよ！"], img: "genki.png" },
  free: { lines: ["のんびりでいいよ","気楽にいこう"], img: "cool.png" }
};

function getTalkCategory() {
  if (totalDistance > 1) return "walk";
  if (points > 200) return "free";
  return "normal";
}

function talk() {
  const data = talkData[getTalkCategory()];
  const line = data.lines[Math.floor(Math.random()*data.lines.length)];

  talkText.textContent = line;
  talkCharacter.src = data.img;
}

updateCharacterSelect();

</script>

</body>
</html>
<link rel="icon" href="favicon.ico">
