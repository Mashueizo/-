<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

  width: 300px;

/* ===== シナリオUI ===== */
#scenarioUI {
  position: fixed;

</head>

<body class="day">

<div class="centerBox">

<div class="card">

  <div class="statusRow">
    <h2 id="distance">0 km</h2>

    <video id="charVideo" autoplay muted loop playsinline>
      <source src="/-/normal.mp4" type="video/mp4">
    </video>
  </div>

  <h3 id="time">0 秒</h3>
  <p id="spotName">現在地：なし</p>

</div>
<div id="map"></div>

<button id="startBtn">スタート</button>
<button id="stopBtn">停止</button>

</div>

<!-- シナリオUI -->
<div id="scenarioUI">
  <img id="sceneImage">
  <div id="textBox"><p id="sceneText"></p></div>
  <div id="choices"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

let map, marker;
let watchId = null;
let lastLat = null, lastLon = null;

let totalDistance = 0;
let startTime = null;
let timer;

let currentQuest = null;
let currentScene = null;

let target = null;
let targetMarker = null;

/* ===== Mapbox ===== */
const MAPBOX_TOKEN = "pk.eyJ1IjoibWFzeXV0ZW4iLCJhIjoiY21ueDJ0OG1tMDAwbzJycTBreGJ0c2VvaCJ9.J8pL7ECfCDthwvTOLHgCEQ";
mapboxgl.accessToken = MAPBOX_TOKEN;

/* ===== シナリオ ===== */
const scenario = {
  start:{text:"おはよー。じゃあ、行こうか。",
    choices:[{text:"OK！",next:"ok1"},{text:"どこに？",next:"where1"}]},

  ok1:{text:"お、やる気あるねぇ。散歩は好き？",
    choices:[{text:"嫌いじゃない",next:"notbad"},{text:"好き",next:"like"}]},

  where1:{text:"どこって散歩に決まってるじゃないか。散歩は嫌いかい？",
    choices:[{text:"嫌いじゃない",next:"notbad"},{text:"好き",next:"like"}]},

  notbad:{text:"素直じゃないなぁ。とりあえず少し歩こっか。",next:"quest1"},
  like:{text:"そうこなくちゃ。とりあえず少し歩こっか。",next:"quest1"},

  quest1:{text:"クエスト：1km歩こう",action:"walk1"},
  quest1_clear:{text:"ちょっと休もうか。いい気分だね。",next:"quest2"},

  quest2:{text:"クエスト：3km歩こう",action:"walk3"},
  quest2_clear:{
    text:"どこにいきたい？",
    choices:[
      {text:"公園",next:"park"}
    ]
  },

  park:{text:"公園ね。行ってみようか。",action:"setPark"},

  arrive:{
    text:"とうちゃーく。ここにはよく来るの？",
    choices:[
      {text:"そこそこ",next:"arrive2"},
      {text:"あんまり",next:"arrive2"}
    ]
  },

  arrive2:{text:"一緒に来るとまた違っていいよね。"}
};

/* ===== シーン表示 ===== */
function showScene(id){
  const s = scenario[id];
  currentScene = id;

  document.getElementById("sceneText").innerText = s.text || "";
  document.getElementById("choices").innerHTML = "";

  if(s.choices){
    s.choices.forEach(c=>{
      const btn=document.createElement("button");
      btn.innerText=c.text;
      btn.onclick=()=>showScene(c.next);
      document.getElementById("choices").appendChild(btn);
    });
  }else if(s.next){
    setTimeout(()=>showScene(s.next),1500);
  }

  if(s.action) handleAction(s.action);
}

/* ===== アクション ===== */
function handleAction(a){
  if(a==="walk1") currentQuest={target:1};
  if(a==="walk3") currentQuest={target:3};
  if(a==="setPark") setTargetToNearby("park");
}

/* ===== 距離 ===== */
function getDistance(a,b,c,d){
  const R=6371;
  const dLat=(c-a)*Math.PI/180;
  const dLon=(d-b)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+
  Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
  Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

/* ===== Map ===== */
function initMap(lat,lon){
  map=new mapboxgl.Map({
    container:"map",
    style:"mapbox://styles/mapbox/streets-v11",
    center:[lon,lat],
    zoom:16
  });
  marker=new mapboxgl.Marker().setLngLat([lon,lat]).addTo(map);
}

/* ===== 周辺取得 ===== */
async function getNearbyPlaces(lon,lat,type){
  try{
    const res=await fetch(
      `https://api.mapbox.com/geocoding/v5/mapbox.places/${type}.json?proximity=${lon},${lat}&limit=5&access_token=${MAPBOX_TOKEN}`
    );
    const data=await res.json();
    return data.features||[];
  }catch{
    return [];
  }
}

/* ===== 目的地 ===== */
async function setTargetToNearby(type){
  const places=await getNearbyPlaces(lastLon,lastLat,type);
  if(!places.length) return;

  const p=places[0];
  target={lng:p.center[0],lat:p.center[1],name:p.text};

  if(targetMarker) targetMarker.remove();
  targetMarker=new mapboxgl.Marker({color:"red"})
    .setLngLat([target.lng,target.lat])
    .addTo(map);
}

/* ===== 到達 ===== */
function checkArrival(lat,lon){
  if(!target) return;
  const d=getDistance(lat,lon,target.lat,target.lng);
  if(d<0.05) onArrive();
}

function onArrive(){
  target=null;
  if(targetMarker) targetMarker.remove();
  showScene("arrive");
}

/* ===== スタート ===== */
document.getElementById("startBtn").onclick=()=>{
  showScene("start");

  startTime=Date.now();
  timer=setInterval(()=>{
    document.getElementById("time").textContent=
    Math.floor((Date.now()-startTime)/1000)+" 秒";
  },1000);

  watchId=navigator.geolocation.watchPosition(pos=>{
    const lat=pos.coords.latitude;
    const lon=pos.coords.longitude;

    if(!map) initMap(lat,lon);

    marker.setLngLat([lon,lat]);
    map.setCenter([lon,lat]);

    if(lastLat){
      const d=getDistance(lastLat,lastLon,lat,lon);
      if(d>0.01){
        totalDistance+=d;
        document.getElementById("distance").textContent=
        totalDistance.toFixed(2)+" km";

        if(currentQuest && totalDistance>=currentQuest.target){
          if(currentScene==="quest1") showScene("quest1_clear");
          else if(currentScene==="quest2") showScene("quest2_clear");
          currentQuest=null;
        }
      }
    }

    lastLat=lat;
    lastLon=lon;

    checkArrival(lat,lon);

  },()=>alert("GPS許可してね"));
};

document.getElementById("stopBtn").onclick=()=>{
  if(watchId) navigator.geolocation.clearWatch(watchId);
  clearInterval(timer);
};

});
</script>
</body>
</html>
